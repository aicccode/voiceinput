name: Build VoiceInput

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # allow manual trigger

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: voiceinput-linux-x86_64
            binary: voiceinput
            release_name: voiceinput-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: voiceinput-windows-x86_64
            binary: voiceinput.exe
            release_name: voiceinput-windows-x86_64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: voiceinput-macos-arm64
            binary: voiceinput
            release_name: voiceinput-macos-arm64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev \
            libasound2-dev libxdo-dev \
            patchelf

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm -y

      - name: Build (release)
        working-directory: src-tauri
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp src-tauri/target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.release_name }}
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.release_name }}
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/voiceinput-linux-x86_64/voiceinput-linux-x86_64
            artifacts/voiceinput-windows-x86_64/voiceinput-windows-x86_64.exe
            artifacts/voiceinput-macos-arm64/voiceinput-macos-arm64
          generate_release_notes: true
