<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceInput</title>
    <link rel="stylesheet" href="styles/overlay.css">
</head>
<body>
    <div id="overlay" class="overlay visible">
        <div class="overlay-content">
            <div id="status-icon" class="status-icon">
                <div class="mic-icon"></div>
            </div>
            <canvas id="waveform" width="300" height="60"></canvas>
            <div class="progress-container" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div id="status-text" class="status-text">请开始说话...</div>
            <div id="progress-text" class="progress-text"></div>
            <div id="path-select" class="path-select">
                <button id="select-path-btn" class="path-btn path-btn-primary">选择保存路径</button>
                <button id="default-path-btn" class="path-btn path-btn-secondary">使用默认路径</button>
            </div>
            <div id="result-text" class="result-text"></div>
            <div id="duration" class="duration"></div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
