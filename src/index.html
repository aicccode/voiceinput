<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceInput</title>
    <link rel="stylesheet" href="styles/overlay.css">
</head>
<body>
    <div id="overlay" class="overlay visible">
        <div class="overlay-content">
            <div id="status-icon" class="status-icon">
                <div class="mic-icon"></div>
            </div>
            <canvas id="waveform" width="300" height="60"></canvas>
            <div class="progress-container" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div id="status-text" class="status-text">请开始说话...</div>
            <div id="progress-text" class="progress-text"></div>
            <div id="mirror-select" class="mirror-select">
                <button id="mirror-global-btn" class="mirror-btn mirror-btn-primary">Hugging Face (国际)</button>
                <button id="mirror-cn-btn" class="mirror-btn mirror-btn-primary">HF Mirror (国内加速)</button>
            </div>
            <div id="retry-actions" class="retry-actions">
                <button id="retry-btn" class="mirror-btn mirror-btn-primary">重试</button>
                <button id="switch-mirror-btn" class="mirror-btn mirror-btn-secondary">切换下载源</button>
            </div>
            <div id="result-text" class="result-text"></div>
            <div id="duration" class="duration"></div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
